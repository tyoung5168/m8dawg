<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #e8a0b0;
    --deep-rose: #c4637a;
    --blush: #fce8ee;
    --cream: #fff9f5;
    --gold: #d4a853;
    --text-dark: #3a2030;
  }

  body {
    min-height: 100vh;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    position: relative;
    cursor: default;
  }

  /* Subtle background pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, #fce8ee88 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, #f9d5e088 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, #fde8f088 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Canvas for floating hearts */
  #canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  /* Landing screen */
  #landing {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    text-align: center;
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  #landing.hidden {
    opacity: 0;
    transform: scale(0.95);
    pointer-events: none;
  }

  .pre-text {
    font-size: clamp(14px, 2vw, 18px);
    letter-spacing: 0.3em;
    color: var(--deep-rose);
    font-weight: 300;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1s ease 0.3s forwards;
  }

  .tagline {
    font-size: clamp(28px, 5vw, 52px);
    color: var(--text-dark);
    font-style: italic;
    font-weight: 300;
    line-height: 1.2;
    opacity: 0;
    animation: fadeUp 1s ease 0.6s forwards;
  }

  /* The button */
  #reveal-btn {
    margin-top: 16px;
    position: relative;
    background: none;
    border: none;
    cursor: pointer;
    opacity: 0;
    animation: fadeUp 1s ease 0.9s forwards;
  }

  .btn-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--rose), var(--deep-rose));
    box-shadow: 
      0 8px 32px rgba(196, 99, 122, 0.35),
      0 2px 8px rgba(196, 99, 122, 0.2),
      inset 0 1px 0 rgba(255,255,255,0.3);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-style: italic;
    font-weight: 300;
    color: white;
    letter-spacing: 0.08em;
    flex-direction: column;
    gap: 6px;
  }

  .btn-inner .heart-icon {
    font-size: 32px;
    line-height: 1;
    display: block;
  }

  #reveal-btn:hover .btn-inner {
    transform: scale(1.08);
    box-shadow: 
      0 16px 48px rgba(196, 99, 122, 0.45),
      0 4px 12px rgba(196, 99, 122, 0.3),
      inset 0 1px 0 rgba(255,255,255,0.3);
  }

  #reveal-btn:active .btn-inner {
    transform: scale(0.97);
  }

  /* Pulse ring around button */
  .pulse-ring {
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 2px solid var(--rose);
    animation: pulseRing 2s ease infinite;
    opacity: 0;
  }

  .pulse-ring:nth-child(2) { animation-delay: 0.7s; }

  @keyframes pulseRing {
    0% { transform: scale(0.9); opacity: 0.6; }
    100% { transform: scale(1.3); opacity: 0; }
  }

  /* Reveal screen */
  #reveal {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
    padding: 20px;
  }

  #reveal.visible {
    opacity: 1;
    pointer-events: all;
  }

  /* Photo frame */
  .photo-wrapper {
    position: relative;
    transform: scale(0.7) translateY(40px);
    transition: transform 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s, opacity 0.6s ease 0.2s;
    opacity: 0;
  }

  #reveal.visible .photo-wrapper {
    transform: scale(1) translateY(0);
    opacity: 1;
  }

  .photo-frame {
    width: min(340px, 85vw);
    height: min(400px, 60vh);
    border-radius: 4px;
    border: 10px solid white;
    box-shadow: 
      0 20px 60px rgba(58, 32, 48, 0.2),
      0 4px 16px rgba(58, 32, 48, 0.1),
      0 0 0 1px rgba(212, 168, 83, 0.3);
    object-fit: cover;
    display: block;
    background: var(--blush);
    position: relative;
  }

  /* Placeholder shown when no photo uploaded */
  .photo-placeholder {
    width: min(340px, 85vw);
    height: min(400px, 60vh);
    border-radius: 4px;
    border: 10px solid white;
    box-shadow: 
      0 20px 60px rgba(58, 32, 48, 0.2),
      0 4px 16px rgba(58, 32, 48, 0.1),
      0 0 0 1px rgba(212, 168, 83, 0.3);
    background: linear-gradient(135deg, #fce8ee, #f9d5e0);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--deep-rose);
  }

  .placeholder-icon { font-size: 64px; }
  .placeholder-text { 
    font-size: 14px; 
    letter-spacing: 0.15em; 
    text-transform: uppercase; 
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    opacity: 0.7;
  }

  /* Gold corner accents on frame */
  .photo-wrapper::before,
  .photo-wrapper::after {
    content: '✦';
    position: absolute;
    color: var(--gold);
    font-size: 18px;
    z-index: 2;
  }
  .photo-wrapper::before { top: -6px; left: -6px; }
  .photo-wrapper::after { bottom: -6px; right: -6px; }

  /* Love message */
  .love-message {
    margin-top: 32px;
    text-align: center;
    transform: translateY(20px);
    opacity: 0;
    transition: transform 0.8s ease 0.8s, opacity 0.8s ease 0.8s;
  }

  #reveal.visible .love-message {
    transform: translateY(0);
    opacity: 1;
  }

  .love-text {
    font-size: clamp(42px, 10vw, 80px);
    color: var(--text-dark);
    font-style: italic;
    font-weight: 300;
    line-height: 1;
    letter-spacing: -0.01em;
  }

  .love-sub {
    margin-top: 8px;
    font-size: clamp(13px, 2vw, 16px);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--deep-rose);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    opacity: 0.8;
  }

  /* Close/back button */
  .back-btn {
    margin-top: 28px;
    background: none;
    border: 1px solid rgba(196, 99, 122, 0.4);
    color: var(--deep-rose);
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 10px 28px;
    border-radius: 100px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    opacity: 0;
    transition: opacity 0.6s ease 1.4s, background 0.2s, color 0.2s;
  }

  #reveal.visible .back-btn {
    opacity: 1;
  }

  .back-btn:hover {
    background: var(--deep-rose);
    color: white;
  }

  /* Upload button - subtle, for setup */
  #upload-area {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 30;
  }

  #upload-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: white;
    border: 1px solid rgba(196, 99, 122, 0.3);
    color: var(--deep-rose);
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 10px 20px;
    border-radius: 100px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    transition: box-shadow 0.2s, transform 0.2s;
  }

  #upload-label:hover {
    box-shadow: 0 8px 24px rgba(196, 99, 122, 0.15);
    transform: translateY(-1px);
  }

  #photo-input { display: none; }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Floating hearts canvas hearts are drawn in JS */
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- Landing -->
<div id="landing">
  <p class="pre-text">A little something for you</p>
  <h1 class="tagline">Press the button<br>when you're ready ♡</h1>
  <button id="reveal-btn" onclick="showReveal()">
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="btn-inner">
      <span class="heart-icon">♡</span>
      <span>Open</span>
    </div>
  </button>
</div>

<!-- Reveal -->
<div id="reveal">
  <div class="photo-wrapper">
    <img id="photo-display" class="photo-frame" style="display:none;" alt="Us">
    <div class="photo-placeholder" id="photo-placeholder">
      <span class="placeholder-icon">♡</span>
      <span class="placeholder-text">Add your photo →</span>
    </div>
  </div>
  <div class="love-message">
    <div class="love-text">I love you</div>
    <div class="love-sub">Always &amp; forever</div>
  </div>
  <button class="back-btn" onclick="goBack()">← Go back</button>
</div>

<!-- Upload -->
<div id="upload-area">
  <label id="upload-label" for="photo-input">
    ♡ Add your photo
  </label>
  <input type="file" id="photo-input" accept="image/*" onchange="handlePhoto(event)">
</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let hearts = [];
  let animating = false;
  let photoSrc = null;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Heart shapes
  class Heart {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * canvas.width;
      this.y = canvas.height + 20;
      this.size = Math.random() * 22 + 10;
      this.speedY = Math.random() * 2.5 + 1.2;
      this.speedX = (Math.random() - 0.5) * 1.2;
      this.opacity = Math.random() * 0.7 + 0.3;
      this.rotation = Math.random() * Math.PI * 2;
      this.rotSpeed = (Math.random() - 0.5) * 0.04;
      this.wobble = Math.random() * Math.PI * 2;
      this.wobbleSpeed = Math.random() * 0.05 + 0.02;
      // Color palette
      const colors = ['#e8a0b0','#c4637a','#f4b8c8','#d4a853','#f9d5e0','#e87ca0'];
      this.color = colors[Math.floor(Math.random() * colors.length)];
    }
    update() {
      this.y -= this.speedY;
      this.wobble += this.wobbleSpeed;
      this.x += Math.sin(this.wobble) * 0.8 + this.speedX;
      this.rotation += this.rotSpeed;
      this.opacity -= 0.003;
    }
    draw() {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      ctx.globalAlpha = Math.max(0, this.opacity);
      ctx.fillStyle = this.color;
      ctx.beginPath();
      const s = this.size;
      ctx.moveTo(0, s * 0.35);
      ctx.bezierCurveTo(0, 0, -s * 0.5, 0, -s * 0.5, -s * 0.25);
      ctx.bezierCurveTo(-s * 0.5, -s * 0.65, 0, -s * 0.65, 0, -s * 0.35);
      ctx.bezierCurveTo(0, -s * 0.65, s * 0.5, -s * 0.65, s * 0.5, -s * 0.25);
      ctx.bezierCurveTo(s * 0.5, 0, 0, 0, 0, s * 0.35);
      ctx.fill();
      ctx.restore();
    }
    isDead() { return this.opacity <= 0 || this.y < -50; }
  }

  let spawnRate = 0;
  let frameCount = 0;

  function animate() {
    if (!animating) { ctx.clearRect(0, 0, canvas.width, canvas.height); return; }
    requestAnimationFrame(animate);
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    frameCount++;
    // Spawn hearts — burst at start, then steady stream
    const rate = frameCount < 60 ? 3 : 1;
    for (let i = 0; i < rate; i++) {
      if (Math.random() < 0.85) hearts.push(new Heart());
    }

    hearts = hearts.filter(h => !h.isDead());
    hearts.forEach(h => { h.update(); h.draw(); });
  }

  function showReveal() {
    document.getElementById('landing').classList.add('hidden');
    setTimeout(() => {
      const reveal = document.getElementById('reveal');
      reveal.classList.add('visible');
      animating = true;
      frameCount = 0;
      hearts = [];
      animate();
    }, 500);
  }

  function goBack() {
    animating = false;
    hearts = [];
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    document.getElementById('reveal').classList.remove('visible');
    setTimeout(() => {
      document.getElementById('landing').classList.remove('hidden');
    }, 400);
  }

  function handlePhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      photoSrc = ev.target.result;
      const img = document.getElementById('photo-display');
      const placeholder = document.getElementById('photo-placeholder');
      img.src = photoSrc;
      img.style.display = 'block';
      placeholder.style.display = 'none';
      document.getElementById('upload-label').textContent = '✓ Photo added';
      document.getElementById('upload-label').style.color = '#7ab87a';
    };
    reader.readAsDataURL(file);
  }
</script>
</body>
</html>
